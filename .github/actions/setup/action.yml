name: 'Setup'
description: 'Setup for @johnludlow/agents NPM package'

outputs:
  version:
    description: 'Semantic version'
    value: ${{ steps.version_step.outputs.MajorMinorPatch }}
  semVer:
    description: 'Full semantic version'
    value: ${{ steps.version_step.outputs.semVer }}
  fullSemVer:
    description: 'Full semantic version with pre-release'
    value: ${{ steps.version_step.outputs.fullSemVer }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v4.2.0
      with:
        versionSpec: '6.4.x'

    - name: Determine Version
      id: version_step
      uses: gittools/actions/gitversion/execute@v4.2.0

    - name: Set Version Environment Variables
      shell: bash
      run: |
        echo "SEMVER=${{ steps.version_step.outputs.semVer }}" >> $GITHUB_ENV
        echo "VERSION=${{ steps.version_step.outputs.MajorMinorPatch }}" >> $GITHUB_ENV
        echo "FullSemVer=${{ steps.version_step.outputs.fullSemVer }}" >> $GITHUB_ENV
        echo "✓ Version: ${{ steps.version_step.outputs.MajorMinorPatch }}"

    - name: Cache NPM packages
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-npm-

