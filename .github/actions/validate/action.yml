name: 'Validate'
description: 'Validate agents and skills markdown'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install rumdl
      shell: bash
      run: npm install -g rumdl

    - name: Validate markdown with rumdl
      shell: bash
      run: rumdl check .

    - name: Validate APM package with validator
      shell: bash
      run: |
        node scripts/validate-apm-package.js

    - name: Compile package if apm is available
      shell: bash
      run: |
        if command -v apm >/dev/null 2>&1; then
          apm compile
        else
          echo "apm CLI not found on runner — skipping apm compile (CI may require apm for full validation)"
        fi

    - name: Validate package.json
      shell: bash
      run: |
        node -e "require('./package.json')" && echo "✓ package.json is valid"
